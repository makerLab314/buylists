<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Testtitel</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      padding: 2rem 1rem;
      color: var(--text);
      background: var(--bg);
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f172a;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    button.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.secondary:hover {
      background: #f1f5f9;
    }

    section {
      margin-bottom: 2.5rem;
    }

    h2 {
      font-size: 1.2rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
      border-bottom: 2px solid var(--border);
      padding-bottom: 0.5rem;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      display: flex;
      align-items: flex-start;
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f8fafc;
    }

    .checkbox-wrapper {
      margin-right: 1rem;
      padding-top: 0.25rem;
    }

    input[type="checkbox"] {
      width: 1.2rem;
      height: 1.2rem;
      cursor: pointer;
      accent-color: var(--primary);
    }

    .content {
      flex: 1;
    }

    .item-title {
      font-weight: 600;
      font-size: 1.05rem;
      display: block;
      margin-bottom: 0.25rem;
    }

    .item-title.checked {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .qty {
      font-weight: 400;
      color: var(--text-muted);
      font-size: 0.9rem;
      background: #e2e8f0;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.5rem;
    }

    .link-wrapper {
      margin-top: 0.25rem;
      font-size: 0.9rem;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        width: 100%;
      }

      button {
        flex: 1;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>Testtitel</h1>
      <div class="actions">
        <span id="sync-status" style="font-size:0.85rem; color: var(--text-muted); align-self: center; white-space: nowrap;">🔄 Lade...</span>
        <button onclick="exportToTxt()" class="secondary">
          📄 Als TXT speichern
        </button>
        <button onclick="sendMail()">
          📧 Per Mail senden
        </button>
      </div>
    </header>

    <details style="margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-muted);">
      <summary style="cursor: pointer; user-select: none;">🔑 Sync-Einstellungen</summary>
      <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
        <input type="password" id="sync-token-input" placeholder="GitHub Token für Sync" style="flex: 1; min-width: 200px; padding: 0.4rem 0.6rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem;">
        <button onclick="saveSyncToken()" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;">Aktivieren</button>
      </div>
      <p style="margin: 0.5rem 0 0; font-size: 0.8rem;">Ohne Token werden Häkchen nur lokal gespeichert und nicht synchronisiert.</p>
    </details>

    <div id="list-content">
      <section>
        <h2>Kat1</h2>
        <ul>
          <li>
            <div class="checkbox-wrapper">
              <input type="checkbox" onchange="toggleItem(this)">
            </div>
            <div class="content">
              <span class="item-title">test6 <span class="qty">87-6</span></span>
              <div class="link-wrapper">
                <a href="google.com" target="_blank" rel="noopener">microsoft</a>
              </div>
            </div>
          </li>
          <li>
            <div class="checkbox-wrapper">
              <input type="checkbox" onchange="toggleItem(this)">
            </div>
            <div class="content">
              <span class="item-title">Hi <span class="qty">34</span></span>
              <div class="link-wrapper">
                <a href="waldorf.de" target="_blank" rel="noopener">Zum Produkt</a>
              </div>
            </div>
          </li>
        </ul>
      </section>

      <section>
        <h2>Kat5</h2>
        <ul>
          <li>
            <div class="checkbox-wrapper">
              <input type="checkbox" onchange="toggleItem(this)">
            </div>
            <div class="content">
              <span class="item-title">Art4 <span class="qty">Meng8</span></span>
              <div class="link-wrapper">
                <a href="germany.de" target="_blank" rel="noopener">Zum Produkt</a>
              </div>
            </div>
          </li>
        </ul>
      </section>

    </div>

    <footer>
      <p>Erstellt für dein Projekt. Viel Spaß beim Einkaufen!</p>
    </footer>
  </div>

  <script>
    const SYNC_REPO_OWNER = 'makerLab314';
    const SYNC_REPO_NAME = 'buylists';
    const SYNC_LIST_NAME = window.location.pathname.split('/').pop().replace('.html', '') || 'list';

    function simpleHash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = Math.imul(31, h) + str.charCodeAt(i) | 0;
      }
      return Math.abs(h).toString(36);
    }

    function getItemKey(li) {
      const section = li.closest('section');
      const sectionTitle = section ? section.querySelector('h2').textContent.trim() : '';
      const itemTitle = li.querySelector('.item-title') ? li.querySelector('.item-title').textContent.trim() : '';
      return simpleHash(sectionTitle + '|' + itemTitle);
    }

    function getCheckedKeys() {
      return Array.from(document.querySelectorAll('li')).reduce((acc, li) => {
        const cb = li.querySelector('input[type="checkbox"]');
        if (cb && cb.checked) acc.push(getItemKey(li));
        return acc;
      }, []);
    }

    function applyCheckedKeys(checkedKeys) {
      const keySet = new Set(checkedKeys);
      document.querySelectorAll('li').forEach(li => {
        const cb = li.querySelector('input[type="checkbox"]');
        const title = li.querySelector('.item-title');
        if (cb && title) {
          const checked = keySet.has(getItemKey(li));
          cb.checked = checked;
          title.classList.toggle('checked', checked);
        }
      });
    }

    function setSyncStatus(status) {
      const el = document.getElementById('sync-status');
      if (!el) return;
      const map = {
        loading: '🔄 Lade...',
        synced: '✅ Synchronisiert',
        saving: '💾 Speichere...',
        'no-token': '🔒 Lokaler Modus',
        error: '⚠️ Sync-Fehler'
      };
      el.textContent = map[status] || status;
    }

    async function loadCheckedStates() {
      try {
        const url = `https://raw.githubusercontent.com/${SYNC_REPO_OWNER}/${SYNC_REPO_NAME}/main/lists/${SYNC_LIST_NAME}_checks.json?_=${Date.now()}`;
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          applyCheckedKeys(data.checked || []);
        }
        setSyncStatus('synced');
      } catch (e) {
        setSyncStatus('error');
      }
    }

    let _saveTimer = null;
    async function saveCheckedStates() {
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(async () => {
        const token = localStorage.getItem('github_token');
        if (!token) { setSyncStatus('no-token'); return; }
        setSyncStatus('saving');
        const filepath = `lists/${SYNC_LIST_NAME}_checks.json`;
        const json = JSON.stringify({ checked: getCheckedKeys(), updated: new Date().toISOString() });
        const content = btoa(unescape(encodeURIComponent(json)));
        try {
          let sha;
          const chk = await fetch(`https://api.github.com/repos/${SYNC_REPO_OWNER}/${SYNC_REPO_NAME}/contents/${filepath}`, {
            headers: { Authorization: `token ${token}` }
          });
          if (chk.ok) sha = (await chk.json()).sha;
          const body = { message: `Sync ${SYNC_LIST_NAME}`, content };
          if (sha) body.sha = sha;
          const put = await fetch(`https://api.github.com/repos/${SYNC_REPO_OWNER}/${SYNC_REPO_NAME}/contents/${filepath}`, {
            method: 'PUT',
            headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          setSyncStatus(put.ok ? 'synced' : 'error');
        } catch (e) {
          setSyncStatus('error');
        }
      }, 800);
    }

    function saveSyncToken() {
      const input = document.getElementById('sync-token-input');
      const token = input ? input.value.trim() : '';
      if (token) {
        localStorage.setItem('github_token', token);
        if (input) input.value = '';
        saveCheckedStates();
      }
    }

    function toggleItem(checkbox) {
      const title = checkbox.closest('li').querySelector('.item-title');
      if (checkbox.checked) {
        title.classList.add('checked');
      } else {
        title.classList.remove('checked');
      }
      saveCheckedStates();
    }

    function cleanUrl(url) {
      try {
        return url.split('?')[0];
      } catch (e) {
        return url;
      }
    }

    function getListText() {
      let text = document.querySelector('h1').innerText + "\n" + "=".repeat(30) + "\n\n";
      const sections = document.querySelectorAll('section');

      sections.forEach(section => {
        const h2 = section.querySelector('h2').innerText;
        text += h2 + "\n" + "-".repeat(h2.length) + "\n";

        const items = section.querySelectorAll('li');
        items.forEach(item => {
          const title = item.querySelector('.item-title').innerText;
          const checked = item.querySelector('input').checked ? "[x]" : "[ ]";
          const links = Array.from(item.querySelectorAll('a')).map(a => cleanUrl(a.href)).join(', ');

          text += checked + " " + title + "\n";
          if (links) text += "    Link: " + links + "\n";
        });
        text += "\n";
      });
      return text;
    }

    function exportToTxt() {
      const text = getListText();
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'einkaufsliste.txt';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function sendMail() {
      const text = getListText();
      const subject = encodeURIComponent(document.querySelector('h1').innerText);
      const body = encodeURIComponent(text);
      const mailtoLink = "mailto:?subject=" + subject + "&body=" + body;

      if (mailtoLink.length > 2000) {
        alert("Die Liste ist zu lang für eine direkte E-Mail. Bitte nutze 'Als TXT speichern'.");
        return;
      }

      window.location.href = mailtoLink;
    }

    document.addEventListener('DOMContentLoaded', () => {
      setSyncStatus('loading');
      loadCheckedStates();
      setInterval(loadCheckedStates, 30000);
    });
  </script>
</body>

</html>
